<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Helios</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h2><i class="fa-solid fa-user-plus"></i> Create Account</h2>
        <form id="registerForm">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your full name" required />

          <label>Email</label>
          <input type="email" id="regEmail" placeholder="Enter email" required />

          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Enter password" required />

          <button type="submit" class="btn"><i class="fa-solid fa-user-check"></i> Register</button>
        </form>

        <p class="switch-text">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
