<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade | Helios</title>
    <link rel="stylesheet" href="css/trade.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      /* Additional styles for new trading interface */
      .trade-container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1.5rem;
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      .trade-header {
        grid-column: 1 / -1;
        background: rgba(255, 255, 255, 0.05);
        padding: 1.5rem;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .trade-header h1 {
        margin: 0;
        color: #fff;
      }

      .price-info {
        display: flex;
        gap: 2rem;
        color: #fff;
      }

      .price-info div {
        text-align: center;
      }

      .price-info span {
        display: block;
        font-size: 0.9rem;
        color: #999;
      }

      .price-info strong {
        font-size: 1.2rem;
      }

      .orderbook-section {
        background: rgba(255, 255, 255, 0.05);
        padding: 1.5rem;
        border-radius: 8px;
      }

      .orderbook-section h3 {
        margin-top: 0;
        color: #fff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 0.5rem;
      }

      .orderbook-header {
        display: flex;
        justify-content: space-between;
        color: #999;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }

      .orderbook-row {
        display: flex;
        justify-content: space-between;
        padding: 0.3rem 0.5rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .orderbook-row:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .orderbook-row.ask .price {
        color: #ef4444;
      }

      .orderbook-row.bid .price {
        color: #10b981;
      }

      .orderbook-row .quantity {
        color: #999;
      }

      .trade-form {
        background: rgba(255, 255, 255, 0.05);
        padding: 1.5rem;
        border-radius: 8px;
      }

      .order-type {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .order-type label {
        flex: 1;
        padding: 0.5rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .order-type input[type="radio"] {
        display: none;
      }

      .order-type input[type="radio"]:checked + span {
        background: #38bdf8;
        color: #000;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.3rem;
        color: #fff;
      }

      .form-group input {
        width: 100%;
        padding: 0.7rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        color: #fff;
        font-size: 1rem;
      }

      .trade-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .trade-buttons button {
        padding: 0.8rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: opacity 0.2s;
      }

      .trade-buttons button:hover:not(:disabled) {
        opacity: 0.9;
      }

      .trade-buttons button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #buyBtn {
        background: #10b981;
        color: #fff;
      }

      #sellBtn {
        background: #ef4444;
        color: #fff;
      }

      .balance-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
        color: #fff;
      }

      .trade-row {
        display: flex;
        justify-content: space-between;
        padding: 0.3rem 0;
        font-size: 0.9rem;
        color: #999;
      }

      .notification {
        position: fixed;
        top: 20px;
        right: -300px;
        background: rgba(0, 0, 0, 0.9);
        color: #fff;
        padding: 1rem 1.5rem;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        z-index: 1000;
        transition: right 0.3s ease;
      }

      .notification.show {
        right: 20px;
      }

      .notification.success {
        border-left: 4px solid #10b981;
      }

      .notification.error {
        border-left: 4px solid #ef4444;
      }

      .notification.info {
        border-left: 4px solid #38bdf8;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="logo"><i class="fa-solid fa-coins"></i> Helios</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="trade.html" class="active">Trade</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </nav>

    <!-- TRADING INTERFACE -->
    <div class="trade-container">
      <!-- Header with pair info -->
      <div class="trade-header">
        <h1><i class="fa-solid fa-chart-line"></i> <span id="pairSymbol">Loading...</span></h1>
        <div class="price-info">
          <div>
            <span>Best Ask</span>
            <strong id="bestAsk">-</strong>
          </div>
          <div>
            <span>Best Bid</span>
            <strong id="bestBid">-</strong>
          </div>
          <div>
            <span>Spread</span>
            <strong id="spread">-</strong>
          </div>
        </div>
      </div>

      <!-- Order Book -->
      <div class="orderbook-section">
        <h3><i class="fa-solid fa-book"></i> Order Book</h3>
        <div class="orderbook-header">
          <span>Price (USD)</span>
          <span>Amount</span>
        </div>
        
        <div style="max-height: 200px; overflow-y: auto;">
          <div id="asks"></div>
        </div>
        
        <div style="margin: 1rem 0; border-top: 2px solid rgba(255,255,255,0.2);"></div>
        
        <div style="max-height: 200px; overflow-y: auto;">
          <div id="bids"></div>
        </div>
      </div>

      <!-- Trading Form -->
      <div class="trade-form">
        <h3 style="margin-top: 0; color: #fff;">Place Order</h3>
        
        <div class="order-type">
          <label>
            <input type="radio" name="orderType" value="LIMIT" id="limitRadio" checked />
            <span>Limit</span>
          </label>
          <label>
            <input type="radio" name="orderType" value="MARKET" id="marketRadio" />
            <span>Market</span>
          </label>
        </div>

        <div class="form-group">
          <label>Price (USD)</label>
          <input type="number" id="price" placeholder="Enter price" step="0.01" />
        </div>

        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="quantity" placeholder="Enter amount" step="0.00000001" />
        </div>

        <div class="form-group">
          <label>Total</label>
          <div style="padding: 0.7rem; background: rgba(255,255,255,0.1); border-radius: 4px; color: #fff;">
            <strong id="total">$0.00</strong>
          </div>
        </div>

        <div class="trade-buttons">
          <button id="buyBtn">
            <i class="fa-solid fa-arrow-up"></i> BUY
          </button>
          <button id="sellBtn">
            <i class="fa-solid fa-arrow-down"></i> SELL
          </button>
        </div>
      </div>

      <!-- User Info & Recent Trades -->
      <div class="orderbook-section">
        <h3><i class="fa-solid fa-wallet"></i> Your Balances</h3>
        <div id="userBalances">
          <div class="balance-item">
            <span>Loading...</span>
          </div>
        </div>

        <h3 style="margin-top: 2rem;"><i class="fa-solid fa-clock-rotate-left"></i> Recent Trades</h3>
        <div class="orderbook-header">
          <span>Time</span>
          <span>Price</span>
          <span>Amount</span>
        </div>
        <div id="recentTrades" style="max-height: 200px; overflow-y: auto;">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/trade.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
